services:

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: media
      POSTGRES_PASSWORD: media
      POSTGRES_DB: mediaplatform
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U media"]
      interval: 5s
      timeout: 3s
      retries: 5

  minio:
    image: minio/minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5

  prometheus:
    image: prom/prometheus:latest
    ports:
      - "9090:9090"
    volumes:
      - ./infra/prometheus.yml:/etc/prometheus/prometheus.yml

  grafana:
    image: grafana/grafana:latest
    ports:
      - "3001:3000"
    environment:
      GF_SECURITY_ADMIN_PASSWORD: admin
    volumes:
      - grafana_data:/var/lib/grafana
      - ./infra/grafana/provisioning:/etc/grafana/provisioning
      - ./infra/grafana/dashboards:/var/lib/grafana/dashboards

  coordinator:
    build:
      context: .
      dockerfile: Dockerfile.coordinator
    environment:
      DATABASE_URL: postgres://media:media@postgres:5432/mediaplatform?sslmode=disable
      REDIS_ADDR: redis:6379
      REDIS_PASSWORD: ""
      PORT: "8080"
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  worker-1:
    build:
      context: .
      dockerfile: Dockerfile.worker
    environment:
      REDIS_ADDR: redis:6379
      REDIS_PASSWORD: ""
      DATABASE_URL: postgres://media:media@postgres:5432/mediaplatform?sslmode=disable
      WORKER_ID: worker-1
      WORKER_POOL_SIZE: "4"
      COORDINATOR_URL: http://coordinator:8080
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
      MINIO_BUCKET: results
    depends_on:
      - coordinator

  worker-2:
    build:
      context: .
      dockerfile: Dockerfile.worker
    environment:
      REDIS_ADDR: redis:6379
      REDIS_PASSWORD: ""
      DATABASE_URL: postgres://media:media@postgres:5432/mediaplatform?sslmode=disable
      WORKER_ID: worker-2
      WORKER_POOL_SIZE: "4"
      COORDINATOR_URL: http://coordinator:8080
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
      MINIO_BUCKET: results
    depends_on:
      - coordinator

  worker-3:
    build:
      context: .
      dockerfile: Dockerfile.worker
    environment:
      REDIS_ADDR: redis:6379
      REDIS_PASSWORD: ""
      DATABASE_URL: postgres://media:media@postgres:5432/mediaplatform?sslmode=disable
      WORKER_ID: worker-3
      WORKER_POOL_SIZE: "4"
      COORDINATOR_URL: http://coordinator:8080
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
      MINIO_BUCKET: results
    depends_on:
      - coordinator

  dashboard:
    build:
      context: .
      dockerfile: Dockerfile.dashboard
    ports:
      - "5173:80"
    depends_on:
      - coordinator

volumes:
  redis_data:
  pg_data:
  minio_data:
  grafana_data: