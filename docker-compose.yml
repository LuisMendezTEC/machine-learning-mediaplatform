      DATABASE_URL: postgres://media:media@postgres:5432/mediaplatform?sslmode=disable
      WORKER_POOL_SIZE: "2"
    volumes:
      - ./dataset:/app/dataset:ro
    command: python -c "print('image-worker-1 placeholder - will be replaced with real implementation in Week 2')"
    depends_on:
      - coordinator
